<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAL — Where Prestige Meets Connection</title>
    <style>
        :root {
            --pure-black: #030303;
            --luxury-black: #0b0b0b;
            --card-black: #121212;
            --gold-primary: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --text-main: #f5f5f5;
            --text-muted: #8a8a8a;
            --border-color: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--pure-black);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1508 0%, transparent 60%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background: rgba(11, 11, 11, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--gold-primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--gold-primary);
        }

        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 4%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 35px;
        }

        .card {
            background: var(--card-black);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
        }

        .card-title {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-primary);
            margin-bottom: 20px;
            border-left: 3px solid var(--gold-primary);
            padding-left: 12px;
        }

        .publisher textarea {
            width: 100%;
            height: 110px;
            background: #181818;
            border: 1px solid #252525;
            border-radius: 12px;
            color: var(--text-main);
            padding: 15px;
            font-size: 15px;
            resize: none;
            outline: none;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .upload-options {
            display: flex;
            gap: 15px;
        }

        .upload-btn {
            background: #161616;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
        }

        .submit-btn {
            background: var(--gold-gradient);
            color: var(--pure-black);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .feed-item {
            border-bottom: 1px solid #1a1a1a;
            padding: 25px 0;
        }

        .feed-meta {
            font-size: 12px;
            color: var(--gold-primary);
            margin-bottom: 8px;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ROYAL</div>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/friends">Friends</a>
        </nav>
    </header>

    <div class="wrapper">
        <div class="grid-container">
            
            <main>
                <div class="card publisher">
                    <div class="card-title">Talk to the World</div>
                    <textarea id="postInput" placeholder="Share your insights, visions, or investments..."></textarea>
                    <div class="action-bar">
                        <div class="upload-options">
                            <button class="upload-btn" onclick="alert('Media upload pipeline active.')">📷 Photo</button>
                            <button class="upload-btn" onclick="alert('Media upload pipeline active.')">🎥 Video</button>
                        </div>
                        <button class="submit-btn" onclick="submitPost()">Publish</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Prestige Feed</div>
                    <div id="feedStream"></div>
                </div>
            </main>

            <aside>
                <div class="card">
                    <div class="card-title">Circle Achievements</div>
                    <p>🏆 Michael Collins completed executive MBA milestone.</p>
                </div>
            </aside>

        </div>
    </div>

    <footer>© 2026 ROYAL</footer>

    <script>
        // Fetch posts from backend when page loads
        async function loadFeed() {
            const response = await fetch('/api/posts');
            const posts = await response.json();
            const stream = document.getElementById('feedStream');
            stream.innerHTML = '';
            
            posts.forEach(post => {
                stream.innerHTML += `
                    <div class="feed-item">
                        <div class="feed-meta">${post.meta}</div>
                        <p>${post.text}</p>
                    </div>
                `;
            });
        }

        // Send new post data to backend
        async function submitPost() {
            const input = document.getElementById('postInput');
            if(!input.value.trim()) return;

            await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });

            input.value = '';
            loadFeed();
        }

        // Initialize connection
        loadFeed();
    </script>
</body>
</html>
